services:
  mysql:
    image: mysql:8.0
    container_name: drive-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: drive_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data: