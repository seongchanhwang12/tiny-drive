openapi: 3.1.0

info:
  title: Tiny Drive API
  description: Cloud 기반 Drive 스타일 문서 관리 시스템 API
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: Users
    description: 회원 관리 API
  - name: Auth
    description: 인증 API
  - name: Items
    description: 파일/폴더 메타데이터 관리 API
  - name: Uploads
    description: 파일 업로드 API
  - name: Permissions
    description: 권한 관리 API

paths:
  /api/v1/users:
    post:
      tags:
        - Users
      summary: 회원 가입
      operationId: join
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: 로그인
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/items:
    post:
      tags:
        - Items
      summary: 폴더 생성
      operationId: createFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderRequest'
      responses:
        '201':
          description: 폴더 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      tags:
        - Items
      summary: 파일/폴더 목록 조회
      description: |
        특정 폴더의 하위 파일/폴더 목록을 조회합니다.
        parentId를 전달하지 않으면 현재 사용자의 개인 드라이브 루트 경로의 목록을 조회합니다.
      operationId: listItems
      parameters:
        - name: parentId
          in: query
          required: false
          description: |
            조회할 부모 폴더 ID입니다.
            생략하면 현재 사용자의 루트 경로를 기준으로 조회합니다.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 파일/폴더 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItemsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      tags:
        - Items
      summary: 파일/폴더 일괄 영구 삭제
      description: 휴지통에 있는 선택한 파일 및 폴더를 영구 삭제합니다.
      operationId: deleteItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteItemsRequest'
      responses:
        '204':
          description: 파일/폴더 영구 삭제 성공
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/items/move:
    patch:
      tags:
        - Items
      summary: 파일/폴더 일괄 이동
      operationId: moveItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveItemsRequest'
      responses:
        '204':
          description: 이동 성공
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/items/trash:
    get:
      tags:
        - Items
      summary: 휴지통 아이템 목록 조회
      operationId: listTrashedItems
      description: 현재 사용자의 휴지통 아이템 목록을 조회합니다.
      responses:
        '200':
          description: 휴지통 아이템 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTrashedItemsResponse'

    patch:
      tags:
        - Items
      summary: 파일/폴더 일괄 휴지통 이동
      operationId: trashItems
      description: 선택한 아이템 목록을 휴지통으로 이동합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrashItemsRequest'
      responses:
        '204':
          description: 휴지통 이동 성공
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/items/restore:
    patch:
      tags:
        - Items
      summary: 파일/폴더 일괄 복원
      operationId: restoreItems
      description: 휴지통에 있는 선택된 파일 및 폴더를 원래 위치로 복원합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreItemsRequest'
      responses:
        '204':
          description: 휴지통 복원 성공
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/items/{itemId}:
    get:
      tags:
        - Items
      summary: 파일/폴더 상세 조회
      operationId: getItem
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/items/{itemId}/name:
    patch:
      tags:
        - Items
      summary: 파일/폴더 이름 변경
      operationId: renameItem
      parameters:
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameItemRequest'
      responses:
        '204':
          description: 이름 변경 성공
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/items/{itemId}/download-url:
    get:
      tags:
        - Items
      summary: 파일 다운로드 URL 발급
      operationId: createDownloadUrl
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '200':
          description: 다운로드 URL 발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrlResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: 김드라이브
        email:
          type: string
          format: email
          example: test@drive.com
        password:
          type: string
          format: password
          minLength: 8
          example: password123!

    UserResponse:
      type: object
      required:
        - userId
        - name
        - email
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 김드라이브
        email:
          type: string
          format: email
          example: test@drive.com

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: test@drive.com
        password:
          type: string
          format: password
          example: password123!

    LoginResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          example: 3600

    CreateFolderRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: 새폴더
        parentId:
          type: integer
          format: int64
          nullable: true
          example: 1

    RenameItemRequest:
      type: object
      required:
        - newName
      properties:
        newName:
          type: string
          example: 새 이름

    MoveItemsRequest:
      type: object
      required:
        - itemIds
        - targetParentId
      properties:
        itemIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
          example: [1, 2, 3]
        targetParentId:
          type: integer
          format: int64
          nullable: true
          example: 2

    TrashItemsRequest:
      type: object
      required:
        - itemIds
      properties:
        itemIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
          example: [1, 2, 3]

    RestoreItemsRequest:
      type: object
      required:
        - itemIds
      properties:
        itemIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
          example: [1, 2, 3]

    DeleteItemsRequest:
      type: object
      required:
        - itemIds
      properties:
        itemIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
          example: [1, 2, 3]

    ListItemsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemSummaryResponse'

    ListTrashedItemsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemSummaryResponse'

    ItemSummaryResponse:
      type: object
      required:
        - itemId
        - name
        - type
        - trashed
        - createdAt
        - updatedAt
      properties:
        itemId:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 테스트파일.txt
        type:
          type: string
          enum:
            - FILE
            - FOLDER
          example: FILE
        size:
          type: integer
          format: int64
          nullable: true
          example: 1024
        extension:
          type: string
          nullable: true
          example: txt
        trashed:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2026-05-11T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-05-11T13:00:00Z'

    GetItemResponse:
      type: object
      required:
        - itemId
        - name
        - type
        - trashed
        - createdAt
        - updatedAt
        - owner
      properties:
        itemId:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 테스트파일.txt
        type:
          type: string
          enum:
            - FILE
            - FOLDER
          example: FILE
        extension:
          type: string
          nullable: true
          example: txt
        mimeType:
          type: string
          nullable: true
          example: text/plain
        size:
          type: integer
          format: int64
          nullable: true
          example: 1024
        parentId:
          type: integer
          format: int64
          nullable: true
          example: 10
        trashed:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2026-05-11T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-05-11T13:00:00Z'
        owner:
          $ref: '#/components/schemas/OwnerResponse'

    OwnerResponse:
      type: object
      required:
        - userId
        - name
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 김드라이브

    DownloadUrlResponse:
      type: object
      required:
        - downloadUrl
        - expiresIn
      properties:
        downloadUrl:
          type: string
          format: uri
          example: https://storage.example.com/items/abc?signature=...
        expiresIn:
          type: integer
          format: int64
          example: 300

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: INVALID_CREDENTIALS
        message:
          type: string
          example: 이메일 또는 비밀번호가 올바르지 않습니다.
        traceId:
          type: string
          example: 01HXYZ...

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  parameters:
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT